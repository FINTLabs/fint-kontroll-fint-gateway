apiVersion: fintlabs.no/v1alpha1
kind: Application
metadata:
  name: fint-kontroll-fint-gateway
  namespace: fintlabs-no
spec:
  orgId: fintlabs.no
  image: ghcr.io/fintlabs/fint-kontroll-fint-gateway:latest
  imagePullPolicy: Always
  env:
    - name: fint.client.base-url
      value: 'http://fint-kontroll-mock-service:3000'
    - name: fint.kontroll.datainput
      value: 'mock'
    - name: fint.resource-gateway.authorization
      value: 'disabled'
    - name: spring.kafka.consumer.group-id
      value: 'fint-kontroll-fint-gateway'
    - name: novari.kafka.topic.org-id
      value: "No 4 - orgid with - and not ."
  envFrom:
    - secretRef:
        name: kontroll-fint-gw
  kafka:
    enabled: true
    acls:
      - topic: 'fintlabs-no.kontroll.*'
        permission: read
      - topic: 'fintlabs-no.kontroll.*'
        permission: admin






